# Local dev overrides — not committed to production
services:
  backend:
    environment:
      LOG_LEVEL: DEBUG
      OBSERVED_PLAY_MEMORY_ENABLED: "true"
    volumes:
      - ./backend:/app  # Full source mount for hot-reload

  celery-worker:
    environment:
      LOG_LEVEL: DEBUG
      OBSERVED_PLAY_MEMORY_ENABLED: "true"
    volumes:
      - ./backend:/app  # Full source mount so workers use latest code

  celery-beat:
    volumes:
      - ./backend:/app  # Full source mount so beat sees current schedule
