name: Nightly Copilot Card Effect Fixes

on:
  schedule:
    # GitHub Actions cron is UTC.
    # 08:07 UTC = 3:07 AM EST.
    # During EDT this will run at 4:07 AM Eastern unless adjusted to 07:07 UTC.
    - cron: "7 8 * * *"

  workflow_dispatch:
    inputs:
      max_findings:
        description: "Maximum findings Copilot should audit/fix in one run"
        required: false
        default: "25"
      copilot_model:
        description: "Optional Copilot coding agent model. Leave blank to use Auto."
        required: false
        default: ""

permissions:
  contents: read
  issues: write

concurrency:
  group: nightly-copilot-card-effect-fixes
  cancel-in-progress: false

jobs:
  create-copilot-fix-task:
    runs-on: ubuntu-latest

    steps:
      - name: Create implementation-fix issue and assign to Copilot
        env:
          GH_TOKEN: ${{ secrets.COPILOT_AGENT_PAT }}
          GH_REPO: ${{ github.repository }}
          MAX_FINDINGS: ${{ inputs.max_findings || '25' }}
          COPILOT_MODEL: ${{ inputs.copilot_model || '' }}
        run: |
          set -euo pipefail

          DATE_UTC="$(date -u +%Y-%m-%d)"
          TITLE="Nightly card effect implementation fixes - ${DATE_UTC}"

          EXISTING="$(gh issue list \
            --state open \
            --search "${TITLE} in:title" \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "$EXISTING" ]; then
            echo "Issue already exists for ${DATE_UTC}: #${EXISTING}"
            exit 0
          fi

          gh label create card-effect-audit \
            --description "Automated card effect implementation audit" \
            --color 7057ff || true

          gh label create card-effect-fix \
            --description "Automated card effect implementation fix" \
            --color 2da44e || true

          gh label create copilot-agent-task \
            --description "Task intended for GitHub Copilot coding agent" \
            --color 0969da || true

          gh label create automated \
            --description "Created by automated workflow" \
            --color cfd3d7 || true

          BODY_FILE="$(mktemp)"

          cat > "$BODY_FILE" <<EOF
          # CARD IMPLEMENTATION AUDIT AND FIX TASK

          This is a scheduled task for GitHub Copilot coding agent.

          Audit card effect implementations in this repository against fresh TCGDex source data, then fix the card implementation bugs, errors, and quality concerns you find.

          Open a pull request with code changes, tests, and a short report summarizing what you audited and fixed.

          ## Context

          Read \`docs/CARD_EXPANSION_RULES.md\` for context on how cards should be implemented.

          Treat TCGDex as the source of truth for card text. Always fetch fresh TCGDex data during the audit. Do not rely on cached fixture data as the source of truth.

          ## Scope

          Audit cards from the local card list/table, starting from the top alphabetically by card name, then by set/id if names tie.

          Continue until either:

          1. You find and address ${MAX_FINDINGS} effect implementation bugs, errors, quality concerns, or engine gaps, or
          2. You get through the entire card list with fewer than ${MAX_FINDINGS} findings.

          Finding zero is acceptable if factual. Do not invent bugs that do not exist.

          ## Implementation rules

          - Treat every set/number combination as a unique card.
          - Same card name does not imply same card behavior.
          - Always fetch fresh TCGDex data for the card being audited.
          - If TCGDex data cannot be fetched for a card, record it in the PR summary and continue.
          - If a handler is missing and the effect is implementable with existing engine mechanics, add the handler and registration.
          - If a handler exists but mismatches TCGDex, fix the handler logic and docstring/comment if needed.
          - If tests exist for similar effects, add or update focused tests for the fix.
          - If a correct fix requires new engine-level mechanics, implement the engine support if it is reasonably scoped.
          - If an engine change is too large or risky for one PR, document it as an \`ENGINE GAP\` in the PR summary instead of making an unsafe partial fix.
          - Do not perform broad unrelated refactors.
          - Do not silently replace precise mechanics with approximate behavior.
          - Prefer small, reviewable fixes.

          ## Checks

          For each card in the audited range:

          ### 1. Fetch fresh TCGDex data

          Fetch the current card definition from TCGDex.

          ### 2. Compare attacks

          For each attack:

          - Does the attack have effect text in TCGDex?
          - If yes, is there a registered handler in \`EffectRegistry\`?
          - If there is a handler, does the handler's docstring/comment and logic match the TCGDex effect text?

          Check for:

          - Wrong damage values
          - Missing secondary effects
          - Wrong conditions
          - Missing coin flip mechanics
          - Wrong target, such as bench vs active or self vs opponent
          - Incorrect discard, draw, search, attach, switch, status, healing, or damage-counter behavior

          ### 3. Compare abilities

          For each ability:

          - Does TCGDex list an ability for this card?
          - Is it registered as active, passive, or otherwise handled?
          - Does the implementation match the ability text?

          ### 4. Check trainer effects

          For trainer cards:

          - Does the handler match the TCGDex effect text?
          - Is it correctly categorized as item, supporter, stadium, tool, or other relevant trainer subtype?

          ### 5. Check special energy effects

          For special energy cards:

          - Does the handler match the TCGDex effect text?
          - Are provided energy type, amount, restrictions, and conditional behavior correct?

          ## Pull request requirements

          Your PR should include:

          1. Code fixes for implementation bugs/errors/quality concerns that are safe to fix.
          2. Tests for changed behavior where practical.
          3. A PR summary containing:
             - Cards audited: X
             - Alphabetical range audited: A-D, or the actual range
             - Bugs/errors/quality concerns fixed: Y
             - Engine gaps left unfixed: Z
             - TCGDex fetch warnings: N
             - Cards with no issues: X
          4. A list of every card/effect fixed, including what TCGDex says and what changed in the implementation.

          Suggested PR title:

          \`Nightly card effect implementation fixes - ${DATE_UTC}\`
          EOF

          ISSUE_JSON="$(
            jq -n \
              --arg title "$TITLE" \
              --rawfile body "$BODY_FILE" \
              --arg repo "$GH_REPO" \
              --arg model "$COPILOT_MODEL" \
              '{
                title: $title,
                body: $body,
                labels: ["card-effect-audit", "card-effect-fix", "copilot-agent-task", "automated"],
                assignees: ["copilot-swe-agent[bot]"],
                agent_assignment: {
                  target_repo: $repo,
                  base_branch: "main",
                  custom_instructions: "Audit card effect implementations against fresh TCGDex data and fix implementation bugs/errors/quality concerns. Keep changes focused and include tests where practical.",
                  custom_agent: "",
                  model: $model
                }
              }'
          )"

          ISSUE_URL="$(
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              /repos/${GH_REPO}/issues \
              --input - <<< "$ISSUE_JSON" \
              --jq '.html_url'
          )"

          echo "Created and assigned Copilot task: $ISSUE_URL"
