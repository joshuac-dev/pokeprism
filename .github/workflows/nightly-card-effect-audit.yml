name: Nightly Copilot Card Effect Fixes

"on":
  schedule:
    # GitHub Actions cron is UTC.
    # 08:07 UTC = 3:07 AM EST / 4:07 AM EDT.
    - cron: "7 8 * * *"

  workflow_dispatch:
    inputs:
      target_findings:
        description: "Target implemented fixes/documented engine gaps for this run"
        required: false
        default: "25"
      start_cursor_override:
        description: "Optional DB cursor to start from instead of docs/AUDIT_STATE.md"
        required: false
        default: ""
      force_new_issue:
        description: "Create a new issue even if today's scheduled issue already exists"
        required: false
        type: boolean
        default: false
      copilot_model:
        description: "Optional Copilot coding agent model"
        required: false
        default: "gpt-5.3-codex"

permissions:
  contents: read
  issues: write

concurrency:
  group: nightly-copilot-card-effect-fixes
  cancel-in-progress: false

jobs:
  create-copilot-fix-task:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository for audit state
        uses: actions/checkout@v5

      - name: Create implementation-fix issue and assign to Copilot
        env:
          GH_TOKEN: ${{ secrets.COPILOT_AGENT_PAT }}
          GH_REPO: ${{ github.repository }}
          TARGET_FINDINGS: ${{ github.event_name == 'workflow_dispatch' && inputs.target_findings || '25' }}
          START_CURSOR_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.start_cursor_override || '' }}
          FORCE_NEW_ISSUE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_new_issue || false }}
          COPILOT_MODEL: ${{ github.event_name == 'workflow_dispatch' && inputs.copilot_model || 'gpt-5.3-codex' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          DATE_UTC="$(date -u +%Y-%m-%d)"
          TITLE_BASE="Nightly DB-backed card effect implementation audit - ${DATE_UTC}"
          STATE_FILE="docs/AUDIT_STATE.md"
          STATE_CURSOR=""

          if [ -f "$STATE_FILE" ]; then
            STATE_CURSOR="$(grep -E '^next_start_cursor:' "$STATE_FILE" | head -n 1 | sed 's/^next_start_cursor:[[:space:]]*//' || true)"
          fi

          if [ -n "$START_CURSOR_OVERRIDE" ]; then
            START_CURSOR="$START_CURSOR_OVERRIDE"
            START_CURSOR_SOURCE="manual workflow input"
          elif [ -n "$STATE_CURSOR" ]; then
            START_CURSOR="$STATE_CURSOR"
            START_CURSOR_SOURCE="docs/AUDIT_STATE.md"
          else
            START_CURSOR="START_OF_DATABASE_CARD_LIST"
            START_CURSOR_SOURCE="default"
          fi

          echo "Audit start cursor: $START_CURSOR"
          echo "Audit start cursor source: $START_CURSOR_SOURCE"
          echo "Copilot model: $COPILOT_MODEL"

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && { [ "$FORCE_NEW_ISSUE" = "true" ] || [ "$FORCE_NEW_ISSUE" = "True" ] || [ -n "$START_CURSOR_OVERRIDE" ]; }; then
            TITLE="${TITLE_BASE} - manual run ${GITHUB_RUN_NUMBER}"
          else
            TITLE="$TITLE_BASE"
          fi

          if [ "$FORCE_NEW_ISSUE" != "true" ] && [ "$FORCE_NEW_ISSUE" != "True" ]; then
            EXISTING="$(gh issue list \
              --state open \
              --search "${TITLE_BASE} in:title" \
              --json number \
              --jq '.[0].number // empty')"

            if [ -n "$EXISTING" ]; then
              echo "Issue already exists for ${DATE_UTC}: #${EXISTING}"
              echo "Use workflow_dispatch with force_new_issue=true to create another run."
              exit 0
            fi
          fi

          gh label create card-effect-audit \
            --description "Automated card effect implementation audit" \
            --color 7057ff || true

          gh label create card-effect-fix \
            --description "Automated card effect implementation fix" \
            --color 2da44e || true

          gh label create copilot-agent-task \
            --description "Task intended for GitHub Copilot coding agent" \
            --color 0969da || true

          gh label create automated \
            --description "Created by automated workflow" \
            --color cfd3d7 || true

          BODY_FILE="$(mktemp)"

          cat > "$BODY_FILE" <<EOF
          # DB-BACKED CARD IMPLEMENTATION AUDIT AND FIX TASK

          This is a scheduled task for GitHub Copilot coding agent.

          Read docs/AUDIT_RULES.md first and follow it as the authoritative instruction set for this task.

          Also read docs/AUDIT_STATE.md to understand the persisted audit cursor.

          The Copilot coding-agent environment should be prepared by .github/workflows/copilot-setup-steps.yml before you start work. That setup provisions PostgreSQL on localhost:5433, runs migrations, and seeds the cards table using the repository's backend/scripts/seed_cards.py script.

          Expected database URL inside the Copilot environment:

          postgresql+asyncpg://pokeprism:changeme_postgres@localhost:5433/pokeprism

          If DB access fails, inspect .github/workflows/copilot-setup-steps.yml, backend/app/config.py, backend/alembic.ini, docker-compose.yml, backend/scripts/seed_cards.py, and backend/app/db/models.py before reporting BLOCKED_DB_ACCESS.

          Do not use docs/CARD_EXPANSION_RULES.md, docs/CARDLIST.md, or docs/POKEMON_MASTER_LIST.md to choose audit candidates. Those files are not audit sources.

          ## Core intent

          Audit cards that are already present in the application database.

          The database determines which cards are in scope.
          TCGDex is the only source of truth for card text and card behavior.
          The codebase determines the current implementation.

          The seeded database establishes audit scope only. The seed data is not card-text authority for behavior checks. For every audited card, fetch fresh TCGDex data and compare the implementation to TCGDex.

          ## Target

          Target implemented findings for this run: ${TARGET_FINDINGS}

          Count only:
          - implementation bugs fixed in code;
          - missing handlers implemented and registered;
          - wrong registrations fixed;
          - documented true engine gaps.

          Do not count unfixed candidate issues.

          ## Start cursor

          Start cursor source: ${START_CURSOR_SOURCE}

          Start cursor:

          ${START_CURSOR}

          This cursor identifies the first database card to attempt in this run. It is not a markdown-card-list position.

          ## Circular traversal rule

          Build the deterministic sorted database-card list by querying the cards table through the repository's SQLAlchemy Card model or an equivalent repository DB helper.

          Start at the start cursor. Continue forward through database cards. If the end of the database list is reached before the target finding count is reached, wrap to the beginning and continue.

          Keep auditing until one of the allowed completion statuses is reached:

          - TARGET_REACHED: at least ${TARGET_FINDINGS} findings were fixed or documented as true engine gaps.
          - DB_EXHAUSTED: every database card was audited in one circular pass from this run's start cursor and fewer than ${TARGET_FINDINGS} findings existed.
          - BLOCKED_TCGDEX: TCGDex was blocked, down, or unusable. Stop gracefully. Do not use local fallback card text.
          - BLOCKED_DB_ACCESS: the agent could not locate or query the application database after checking the setup workflow and repository DB config.
          - PARTIAL_TIME_BUDGET: Copilot warned that its time budget was nearly exhausted before the target was reached.

          ## Required execution behavior

          Do not do a long discovery-only pass.

          Work card-by-card:
          1. Query the next card from the database.
          2. Fetch that exact card from TCGDex.
          3. Compare TCGDex behavior to the implementation.
          4. Fix safe implementation issues immediately.
          5. Add or update focused tests immediately.
          6. Record the card in the audit ledger.
          7. Continue until a completion status is reached.

          If TCGDex is unavailable, blocked, or down, stop and report BLOCKED_TCGDEX. Do not guess. Do not fall back to local card lists.

          If Copilot warns that the time budget is nearly exhausted, stop auditing new cards, finish the current safe fix if practical, run focused tests, update docs/AUDIT_STATE.md with the next database cursor, open the PR, and include the next resume cursor.

          ## Required state update

          Update docs/AUDIT_STATE.md in the PR unless no database card was audited.

          On TARGET_REACHED or PARTIAL_TIME_BUDGET, set next_start_cursor to the next database card after the last fully audited card.

          On BLOCKED_TCGDEX before any card is audited, do not advance next_start_cursor.

          On DB_EXHAUSTED, keep or reset next_start_cursor according to docs/AUDIT_RULES.md.

          ## Required PR report

          Include:
          - Completion status
          - TCGDEX_PREFLIGHT
          - DB_CARD_SOURCE
          - DB_BOOTSTRAP_CARD_COUNT, if visible from setup output or verified directly
          - Start cursor source
          - Start cursor used
          - Traversal wrapped: yes/no
          - Target findings
          - Implemented fixes
          - Documented engine gaps
          - Unfixed candidate issues
          - Database cards audited
          - First card audited
          - Last card fully audited
          - Next resume cursor
          - AUDIT_STATE.md updated: yes/no
          - Focused tests run
          - Full tests run, if any
          - Per-card audit ledger

          Suggested PR title:

          Nightly DB-backed card effect implementation fixes - ${DATE_UTC}
          EOF

          ISSUE_JSON="$(
            jq -n \
              --arg title "$TITLE" \
              --rawfile body "$BODY_FILE" \
              --arg repo "$GH_REPO" \
              --arg model "$COPILOT_MODEL" \
              --arg target "$TARGET_FINDINGS" \
              --arg cursor "$START_CURSOR" \
              '{
                title: $title,
                body: $body,
                labels: ["card-effect-audit", "card-effect-fix", "copilot-agent-task", "automated"],
                assignees: ["copilot-swe-agent[bot]"],
                agent_assignment: {
                  target_repo: $repo,
                  base_branch: "main",
                  custom_instructions: (
                    "Read docs/AUDIT_RULES.md and docs/AUDIT_STATE.md first. The Copilot setup workflow should provision Postgres on localhost:5433, run migrations, and seed cards via backend/scripts/seed_cards.py. " +
                    "This is a DB-backed rotating implementation audit, not a card-list expansion task. " +
                    "Use the database to determine cards in scope. Use TCGDex as the only source of truth for card text. " +
                    "Start at this DB cursor: " + $cursor + ". Traverse the DB card list circularly: after the end, wrap to the beginning until target, full-cycle exhaustion, TCGDex block, DB block, or time budget. " +
                    "Do not use CARD_EXPANSION_RULES.md, CARDLIST.md, or POKEMON_MASTER_LIST.md as audit candidate sources. " +
                    "Do not run a discovery-only pass; fix and test issues card-by-card. " +
                    "Target " + $target + " implemented fixes/documented engine gaps. " +
                    "Update docs/AUDIT_STATE.md with the next DB cursor in the PR. " +
                    "If TCGDex is unavailable, stop gracefully with BLOCKED_TCGDEX and do not use local fallback card data. " +
                    "If DB access fails, inspect copilot-setup-steps.yml and repository DB config before reporting BLOCKED_DB_ACCESS. " +
                    "If time budget warnings appear, stop auditing new cards, finish the current safe fix, test, PR, and include the next DB resume cursor."
                  ),
                  custom_agent: "",
                  model: $model
                }
              }'
          )"

          ISSUE_URL="$(
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              /repos/${GH_REPO}/issues \
              --input - <<< "$ISSUE_JSON" \
              --jq '.html_url'
          )"

          echo "Created and assigned Copilot task: $ISSUE_URL"
