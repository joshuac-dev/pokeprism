name: Nightly Copilot Card Effect Fixes

"on":
  schedule:
    - cron: "7 8 * * *"

  workflow_dispatch:
    inputs:
      target_findings:
        description: "Target implemented fixes/documented engine gaps for this run"
        required: false
        default: "25"
      start_cursor_override:
        description: "Optional DB cursor to start from instead of docs/AUDIT_STATE.md"
        required: false
        default: ""
      force_new_issue:
        description: "Create a new issue even if today's scheduled issue already exists"
        required: false
        type: boolean
        default: false
      copilot_model:
        description: "Optional Copilot coding agent model. Leave blank for Copilot Auto."
        required: false
        default: ""
      min_cards_before_partial:
        description: "Minimum database cards audited before CONTINUATION_REQUIRED is acceptable"
        required: false
        default: "100"

permissions:
  contents: read
  issues: write

concurrency:
  group: nightly-copilot-card-effect-fixes
  cancel-in-progress: false

jobs:
  create-copilot-fix-task:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository for audit state
        uses: actions/checkout@v5

      - name: Create implementation-fix issue and assign to Copilot
        env:
          GH_TOKEN: ${{ secrets.COPILOT_AGENT_PAT }}
          GH_REPO: ${{ github.repository }}
          TARGET_FINDINGS: ${{ github.event_name == 'workflow_dispatch' && inputs.target_findings || '25' }}
          START_CURSOR_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.start_cursor_override || '' }}
          FORCE_NEW_ISSUE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_new_issue || false }}
          COPILOT_MODEL: ${{ github.event_name == 'workflow_dispatch' && inputs.copilot_model || '' }}
          MIN_CARDS_BEFORE_PARTIAL: ${{ github.event_name == 'workflow_dispatch' && inputs.min_cards_before_partial || '100' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          DATE_UTC="$(date -u +%Y-%m-%d)"
          REPORT_FILE="docs/audit_runs/${DATE_UTC}-${GITHUB_RUN_NUMBER}-card-effect-audit.json"
          TITLE_BASE="Nightly DB-backed card effect implementation audit - ${DATE_UTC}"
          STATE_FILE="docs/AUDIT_STATE.md"
          STATE_CURSOR=""

          if [ -f "$STATE_FILE" ]; then
            STATE_CURSOR="$(grep -E '^next_start_cursor:' "$STATE_FILE" | head -n 1 | sed 's/^next_start_cursor:[[:space:]]*//' || true)"
          fi

          if [ -n "$START_CURSOR_OVERRIDE" ]; then
            START_CURSOR="$START_CURSOR_OVERRIDE"
            START_CURSOR_SOURCE="manual workflow input"
          elif [ -n "$STATE_CURSOR" ]; then
            START_CURSOR="$STATE_CURSOR"
            START_CURSOR_SOURCE="docs/AUDIT_STATE.md"
          else
            START_CURSOR="START_OF_DATABASE_CARD_LIST"
            START_CURSOR_SOURCE="default"
          fi

          echo "Audit start cursor: $START_CURSOR"
          echo "Audit start cursor source: $START_CURSOR_SOURCE"
          if [ -n "$COPILOT_MODEL" ]; then
            echo "Copilot model override: $COPILOT_MODEL"
          else
            echo "Copilot model override: <blank; Copilot Auto>"
          fi

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && { [ "$FORCE_NEW_ISSUE" = "true" ] || [ "$FORCE_NEW_ISSUE" = "True" ] || [ -n "$START_CURSOR_OVERRIDE" ]; }; then
            TITLE="${TITLE_BASE} - manual run ${GITHUB_RUN_NUMBER}"
          else
            TITLE="$TITLE_BASE"
          fi

          if [ "$FORCE_NEW_ISSUE" != "true" ] && [ "$FORCE_NEW_ISSUE" != "True" ]; then
            EXISTING="$(gh issue list --state open --search "${TITLE_BASE} in:title" --json number --jq '.[0].number // empty')"
            if [ -n "$EXISTING" ]; then
              echo "Issue already exists for ${DATE_UTC}: #${EXISTING}"
              echo "Use workflow_dispatch with force_new_issue=true to create another run."
              exit 0
            fi
          fi

          gh label create card-effect-audit --description "Automated card effect implementation audit" --color 7057ff || true
          gh label create card-effect-fix --description "Automated card effect implementation fix" --color 2da44e || true
          gh label create copilot-agent-task --description "Task intended for GitHub Copilot coding agent" --color 0969da || true
          gh label create automated --description "Created by automated workflow" --color cfd3d7 || true
          gh label create docs-sync --description "Documentation must be kept in sync with implementation state" --color f9d0c4 || true
          gh label create robust-audit-v2 --description "Robust audit v2: machine-readable ledger required" --color e4e669 || true
          gh label create audit-continuation-required --description "Audit stopped early; continuation required before merge" --color d93f0b || true
          gh label create audit-partial-merge-ok --description "Partial audit merge approved by maintainer" --color 0e8a16 || true

          BODY_FILE="$(mktemp)"

          cat > "$BODY_FILE" <<ROBUSTAUDITEOF
          # DB-BACKED CARD IMPLEMENTATION AUDIT AND FIX TASK (ROBUST-AUDIT-v2)

          This is a scheduled task for GitHub Copilot coding agent.
          This task runs under robust-audit-v2 enforcement rules.

          The PR gate at .github/workflows/card-effect-audit-pr-gate.yml validates the
          machine-readable audit report and rejects PRs that do not meet enforcement criteria.

          ## Required reading order

          Before doing any audit or code changes, read these files in this order:

          1. docs/STATUS.md
          2. docs/CHANGELOG.md
          3. docs/AUDIT_RULES.md
          4. docs/AUDIT_STATE.md
          5. README.md
          6. docs/PROJECT.md
          7. Relevant docs/proposals/*.md files only if touched by the task

          ## Documentation hierarchy

          - docs/STATUS.md is the current-state operational handoff. Its top/current section is authoritative.
          - docs/CHANGELOG.md is the evidence-based historical record.
          - docs/AUDIT_RULES.md and docs/AUDIT_STATE.md define the active DB-backed audit workflow.
          - docs/PROJECT.md is historical architecture context.
          - README.md is onboarding/public overview. If it conflicts with docs/STATUS.md, docs/STATUS.md wins.
          - docs/CARD_EXPANSION_RULES.md, docs/CARDLIST.md, and docs/POKEMON_MASTER_LIST.md are
            historical/supporting documents. Do not use them as active audit authority.

          ## Machine-readable audit report (REQUIRED)

          Before opening the PR, create and commit:

              ${REPORT_FILE}

          This file is required. The PR gate will reject PRs without a valid report.

              {
                "run_date_utc": "YYYY-MM-DD",
                "completion_status": "<status>",
                "target_findings": ${TARGET_FINDINGS},
                "fixes_implemented": 0,
                "engine_gaps_documented": 0,
                "total_findings": 0,
                "cards_audited": 0,
                "db_card_count": 0,
                "full_cycle_completed": false,
                "continuation_required": false,
                "start_cursor_used": "",
                "first_card_audited": "",
                "last_card_fully_audited": "",
                "next_resume_cursor": "",
                "traversal_wrapped": false,
                "audit_ledger": [
                  {
                    "seq": 1,
                    "db_id": 0,
                    "card_name": "",
                    "set_id": "",
                    "card_number": "",
                    "tcgdex_id": "",
                    "tcgdex_fetch": "ok",
                    "effects_checked": [],
                    "result": "no-issue",
                    "finding_counted": false,
                    "notes": ""
                  }
                ]
              }

          Every card examined must have a ledger entry.

          Allowed audit_ledger result values:
            fixed, engine-gap, no-issue, tcgdex-unresolved, db-identity-gap,
            blocked-tcgdex, blocked-db-access, continuation-required

          ## Allowed completion statuses (robust-audit-v2)

          TARGET_REACHED:
            fixes_implemented + engine_gaps_documented >= ${TARGET_FINDINGS}.
            Set full_cycle_completed appropriately and continuation_required=false.

          DB_EXHAUSTED:
            Every database card was audited in one complete circular pass.
            full_cycle_completed MUST be true. cards_audited MUST be >= db_card_count.

          FULL_CYCLE_COMPLETE:
            Equivalent to DB_EXHAUSTED when target was also reached during the full cycle.
            full_cycle_completed MUST be true. cards_audited MUST be >= db_card_count.

          BLOCKED_TCGDEX:
            TCGDex was blocked, down, or unusable. No minimum findings required.

          BLOCKED_DB_ACCESS:
            The agent could not locate or query the application database. No minimum findings required.

          CONTINUATION_REQUIRED:
            The run stopped before reaching TARGET_REACHED or completing a full DB circular pass.
            Set continuation_required=true in the JSON. Add label audit-continuation-required.

          PARTIAL_TIME_BUDGET is NOT a valid completion status under robust-audit-v2.
          Any PR reporting PARTIAL_TIME_BUDGET will be rejected by the PR gate.
          Use CONTINUATION_REQUIRED instead.

          ## Early-stop and time-budget behavior (robust-audit-v2)

          If you must stop for any reason before TARGET_REACHED or DB_EXHAUSTED:

          1. Stop auditing new cards.
          2. Finish the current card fix if safe to complete.
          3. Run the most relevant focused tests.
          4. Commit all changes including ${REPORT_FILE}.
          5. Set completion_status to CONTINUATION_REQUIRED and continuation_required=true in JSON.
          6. Set next_resume_cursor to the next database card after the last fully audited card.
          7. Update docs/AUDIT_STATE.md with that cursor.
          8. Open the PR only if at least ${MIN_CARDS_BEFORE_PARTIAL} database cards were audited.
          9. Add label audit-continuation-required to the PR.

          Do NOT report PARTIAL_TIME_BUDGET. It is not accepted under robust-audit-v2.

          ## Minimum cards before CONTINUATION_REQUIRED is acceptable

          At least ${MIN_CARDS_BEFORE_PARTIAL} database cards must be audited before
          CONTINUATION_REQUIRED is acceptable. If fewer cards were audited, continue
          until the minimum is reached or another terminal status is reached.

          ## Start cursor

          Start cursor source: ${START_CURSOR_SOURCE}
          Start cursor: ${START_CURSOR}

          ## Required state update (robust-audit-v2)

          CRITICAL: The next_resume_cursor in ${REPORT_FILE}
          MUST match next_start_cursor in docs/AUDIT_STATE.md whenever cards were audited.
          The PR gate will reject PRs where these values do not match.

          ## Required PR report

          Include in the PR description:

          - Completion status
          - Target findings: ${TARGET_FINDINGS}
          - Implemented fixes
          - Documented engine gaps
          - Database cards audited
          - First card audited
          - Last card fully audited
          - Next resume cursor
          - AUDIT_STATE.md updated: yes/no
          - STATUS.md updated: yes/no
          - CHANGELOG.md updated: yes/no
          - Machine-readable report: ${REPORT_FILE} committed

          ## Hard prohibitions

          Do not use CARD_EXPANSION_RULES.md, CARDLIST.md, or POKEMON_MASTER_LIST.md.
          Do not guess card text.
          Do not report PARTIAL_TIME_BUDGET.
          Do not commit frontend/node_modules.
          Do not omit ${REPORT_FILE}.
          Do not advance docs/AUDIT_STATE.md unless an actual database-card audit occurred.
          ROBUSTAUDITEOF

          JQ_FILTER='
            {
              title: $title,
              body: $body,
              labels: ["card-effect-audit", "card-effect-fix", "copilot-agent-task", "automated", "docs-sync", "robust-audit-v2"],
              assignees: ["copilot-swe-agent[bot]"],
              agent_assignment: {
                target_repo: $repo,
                base_branch: "main",
                custom_instructions: (
                  "Read docs/STATUS.md, docs/CHANGELOG.md, docs/AUDIT_RULES.md, docs/AUDIT_STATE.md, README.md, and then docs/PROJECT.md before doing any work. " +
                  "This is a DB-backed rotating implementation audit. Use the database to determine cards in scope. Use TCGDex as the only source of truth for card text. " +
                  "Start at this DB cursor: " + $cursor + ". Traverse the DB card list circularly until TARGET_REACHED, DB_EXHAUSTED/FULL_CYCLE_COMPLETE, TCGDex block, DB block, or CONTINUATION_REQUIRED. " +
                  "Do not use CARD_EXPANSION_RULES.md, CARDLIST.md, or POKEMON_MASTER_LIST.md as audit candidate sources. " +
                  "Target " + $target + " implemented fixes/documented engine gaps. " +
                  "PARTIAL_TIME_BUDGET is NOT a valid completion status under robust-audit-v2. Use CONTINUATION_REQUIRED (continuation_required=true in JSON) instead. " +
                  "TARGET_REACHED requires fixes_implemented + engine_gaps_documented >= target_findings. DB_EXHAUSTED and FULL_CYCLE_COMPLETE require full_cycle_completed=true and cards_audited >= db_card_count. " +
                  "Minimum " + $mincards + " cards must be audited before CONTINUATION_REQUIRED is acceptable. " +
                  "Commit docs/audit_runs/<YYYY-MM-DD>-<run-number>-card-effect-audit.json before opening the PR. The PR gate will reject PRs without a valid report or with invalid status. " +
                  "The next_resume_cursor in the JSON must match next_start_cursor in docs/AUDIT_STATE.md when cards were audited. " +
                  "Update docs/STATUS.md with a concise current-state handoff. Update docs/CHANGELOG.md if meaningful completed work occurred. " +
                  "Update docs/AUDIT_STATE.md with the next DB cursor only if an actual database-card audit occurred. " +
                  "If TCGDex is unavailable, stop gracefully with BLOCKED_TCGDEX and do not use local fallback card data. " +
                  "If time budget warnings appear or you must stop early, set completion_status=CONTINUATION_REQUIRED with continuation_required=true in JSON, update docs/AUDIT_STATE.md, commit all changes including the JSON report, add label audit-continuation-required, and open the PR if at least " + $mincards + " cards were audited. " +
                  "Do not commit frontend/node_modules."
                ),
                custom_agent: ""
              }
            }
            | if ($model | length) > 0
              then .agent_assignment.model = $model
              else .
              end
          '

          ISSUE_JSON="$(
            jq -n \
              --arg title "$TITLE" \
              --rawfile body "$BODY_FILE" \
              --arg repo "$GH_REPO" \
              --arg model "$COPILOT_MODEL" \
              --arg target "$TARGET_FINDINGS" \
              --arg cursor "$START_CURSOR" \
              --arg mincards "$MIN_CARDS_BEFORE_PARTIAL" \
              "$JQ_FILTER"
          )"

          ISSUE_URL="$(
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              /repos/${GH_REPO}/issues \
              --input - <<< "$ISSUE_JSON" \
              --jq '.html_url'
          )"

          echo "Created and assigned Copilot task: $ISSUE_URL"
