name: Card Effect Audit PR Gate

"on":
  pull_request:
    types: [opened, synchronize, labeled, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-audit-pr:
    name: Validate audit report
    runs-on: ubuntu-latest
    if: >
      contains(github.event.pull_request.labels.*.name, 'card-effect-audit') ||
      contains(github.event.pull_request.labels.*.name, 'robust-audit-v2')

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write gate script
        run: |
          cat > /tmp/gate_checks.py << 'GATE_EOF'
          import json
          import os
          import re
          import subprocess
          import sys

          errors = []
          warnings = []

          def fail(msg):
              errors.append(msg)

          def warn(msg):
              warnings.append(msg)

          base_ref = os.environ.get("GITHUB_BASE_REF", "main")

          # ── 1a. frontend/node_modules (check all tracked files) ─────────────────────
          result = subprocess.run(
              ["git", "ls-files", "frontend/node_modules"],
              capture_output=True, text=True
          )
          nm_count = len([l for l in result.stdout.splitlines() if l.strip()])
          if nm_count > 0:
              fail(f"frontend/node_modules is tracked in git ({nm_count} files). Remove it.")

          # ── 1b. Unsafe artifacts (only PR-added files) ───────────────────────────────
          result = subprocess.run(
              ["git", "diff", "--name-only", "--diff-filter=A",
               f"origin/{base_ref}...HEAD"],
              capture_output=True, text=True
          )
          added_files = result.stdout.splitlines()
          unsafe_patterns = [
              re.compile(r"tmp/.*\.log$", re.IGNORECASE),
              re.compile(r"battle.*\.log$", re.IGNORECASE),
              re.compile(r".*\.dump$", re.IGNORECASE),
              re.compile(r"(^|/)database[^/]*\.sql$"),
              # Block import_candidates txt/md/log; existing README.md is a pre-existing
              # tracked file and will not appear in --diff-filter=A for audit PRs.
              re.compile(r"observed_play/import_candidates/.*\.(txt|md|log)$", re.IGNORECASE),
          ]
          for f in added_files:
              for pat in unsafe_patterns:
                  if pat.search(f):
                      fail(f"Unsafe artifact committed: {f}")
                      break

          # ── 2. Find the audit report changed by this PR ──────────────────────────────
          result = subprocess.run(
              ["git", "diff", "--name-only",
               "--diff-filter=AM",  # Added or Modified
               f"origin/{base_ref}...HEAD",
               "--", "docs/audit_runs/*-card-effect-audit.json"],
              capture_output=True, text=True
          )
          changed_reports = [f for f in result.stdout.splitlines() if f.strip()]

          if not changed_reports:
              fail(
                  "No docs/audit_runs/*-card-effect-audit.json added or modified by this PR. "
                  "A machine-readable audit report is required."
              )
              for e in errors:
                  print(f"ERROR: {e}")
              sys.exit(1)

          if len(changed_reports) > 1:
              fail(
                  f"Multiple audit reports changed in this PR: {changed_reports}. "
                  "Exactly one audit report must be added or modified per PR."
              )
              for e in errors:
                  print(f"ERROR: {e}")
              sys.exit(1)

          report_path = changed_reports[0]
          print(f"Found audit report: {report_path}")

          # ── 3. Parse JSON ─────────────────────────────────────────────────────────────
          try:
              with open(report_path) as fh:
                  data = json.load(fh)
          except json.JSONDecodeError as exc:
              fail(f"Invalid JSON in {report_path}: {exc}")
              for e in errors:
                  print(f"ERROR: {e}")
              sys.exit(1)

          # ── 4. Completion status and cursor checks (structural gate) ──────────────────
          required = [
              "run_date_utc", "completion_status", "target_findings",
              "fixes_implemented", "engine_gaps_documented", "total_findings",
              "cards_audited", "db_card_count", "full_cycle_completed",
              "continuation_required", "start_cursor_used",
              "first_card_audited", "last_card_fully_audited",
              "next_resume_cursor", "traversal_wrapped", "audit_ledger",
          ]
          for field in required:
              if field not in data:
                  fail(f"Missing required field in audit report: {field}")

          if errors:
              for e in errors:
                  print(f"ERROR: {e}")
              sys.exit(1)

          status = data["completion_status"]
          fixes = int(data.get("fixes_implemented", 0))
          gaps = int(data.get("engine_gaps_documented", 0))
          total = fixes + gaps
          target = int(data.get("target_findings", 0))
          cards_audited = int(data.get("cards_audited", 0))
          db_card_count = int(data.get("db_card_count", 0))
          full_cycle = bool(data.get("full_cycle_completed", False))
          continuation = bool(data.get("continuation_required", False))
          next_cursor = data.get("next_resume_cursor", "")
          min_cards = int(data.get("min_cards_before_partial", 100))

          print(f"completion_status:        {status}")
          print(f"target_findings:          {target}")
          print(f"fixes_implemented:        {fixes}")
          print(f"engine_gaps:              {gaps}")
          print(f"total_findings:           {total}")
          print(f"cards_audited:            {cards_audited}")
          print(f"db_card_count:            {db_card_count}")
          print(f"full_cycle:               {full_cycle}")
          print(f"continuation:             {continuation}")
          print(f"min_cards_before_partial: {min_cards}")

          TERMINAL_STATUSES = {
              "TARGET_REACHED", "DB_EXHAUSTED", "FULL_CYCLE_COMPLETE",
              "BLOCKED_TCGDEX", "BLOCKED_DB_ACCESS", "CONTINUATION_REQUIRED",
          }

          if status not in TERMINAL_STATUSES:
              if status == "PARTIAL_TIME_BUDGET":
                  fail(
                      "PARTIAL_TIME_BUDGET is not a valid completion status under robust-audit-v2. "
                      "Use CONTINUATION_REQUIRED instead."
                  )
              else:
                  fail(
                      f"Unknown completion_status: {status!r}. "
                      f"Must be one of: {', '.join(sorted(TERMINAL_STATUSES))}"
                  )

          if status == "TARGET_REACHED":
              if total < target:
                  fail(
                      f"TARGET_REACHED requires fixes_implemented + engine_gaps_documented >= "
                      f"target_findings. Got {total} < {target}."
                  )

          if status in ("DB_EXHAUSTED", "FULL_CYCLE_COMPLETE"):
              if not full_cycle:
                  fail(f"{status} requires full_cycle_completed=true in the audit report.")
              if db_card_count > 0 and cards_audited < db_card_count:
                  fail(
                      f"{status} requires cards_audited >= db_card_count. "
                      f"Got {cards_audited} < {db_card_count}."
                  )

          if status == "CONTINUATION_REQUIRED":
              if not continuation:
                  fail("CONTINUATION_REQUIRED requires continuation_required=true in the audit report.")
              if cards_audited < min_cards:
                  fail(
                      f"CONTINUATION_REQUIRED requires at least {min_cards} cards audited "
                      f"(min_cards_before_partial). Got {cards_audited}. "
                      "Continue auditing until the minimum is reached or another terminal "
                      "status is reached."
                  )
              pr_labels_raw = os.environ.get("PR_LABELS", "[]")
              try:
                  pr_labels = json.loads(pr_labels_raw)
              except Exception:
                  pr_labels = []
              if not ("audit-continuation-required" in pr_labels or
                      "audit-partial-merge-ok" in pr_labels):
                  fail(
                      "CONTINUATION_REQUIRED PRs must have either the audit-continuation-required "
                      "or audit-partial-merge-ok label. Add one of these labels to allow partial merge."
                  )

          # ── 5. Cursor consistency ─────────────────────────────────────────────────────
          if cards_audited > 0 and next_cursor:
              state_cursor = ""
              try:
                  with open("docs/AUDIT_STATE.md") as fh:
                      for line in fh:
                          m = re.match(r"^next_start_cursor:\s*(.*)", line)
                          if m:
                              state_cursor = m.group(1).strip()
                              break
              except FileNotFoundError:
                  warn("docs/AUDIT_STATE.md not found; cannot verify cursor consistency.")

              if state_cursor and state_cursor != next_cursor:
                  fail(
                      f"Cursor mismatch: next_resume_cursor in audit JSON is {next_cursor!r} "
                      f"but next_start_cursor in docs/AUDIT_STATE.md is {state_cursor!r}. "
                      "Update docs/AUDIT_STATE.md to match the JSON or vice versa."
                  )
              elif state_cursor == next_cursor:
                  print(f"Cursor consistent: {next_cursor!r}")

          for w in warnings:
              print(f"WARNING: {w}")

          if errors:
              print()
              for e in errors:
                  print(f"ERROR: {e}")
              sys.exit(1)

          print()
          print(f"Gate checks PASSED. Proceeding to ledger quality validation.")
          # Export the report path for the next step
          with open(os.environ.get("GITHUB_ENV", "/dev/null"), "a") as env_file:
              env_file.write(f"AUDIT_REPORT={report_path}\n")
          GATE_EOF

      - name: Run gate checks
        env:
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: python3 /tmp/gate_checks.py

      - name: Validate ledger quality (evidence schema v3)
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          # Find the audit report (same logic as gate_checks.py)
          REPORT="$(git diff --name-only --diff-filter=AM \
            "origin/$GITHUB_BASE_REF...HEAD" \
            -- 'docs/audit_runs/*-card-effect-audit.json' | head -n1)"

          if [ -z "$REPORT" ]; then
            echo "ERROR: No audit report found; gate_checks should have caught this."
            exit 1
          fi

          echo "Running ledger quality validation on: $REPORT"
          python3 backend/scripts/validate_card_audit_report.py "$REPORT" || {
            echo ""
            echo "ERROR: Audit report uses legacy shallow ledger format."
            echo "Re-run audit with evidence-bearing ledger schema (v3)."
            echo "Each no-issue entry must include:"
            echo "  - tcgdex_effects_extracted (exact effects from TCGDex)"
            echo "  - implementation_evidence (registry key, handler symbol, source file)"
            echo "  - semantic_checks (mechanics verified)"
            echo "  - confidence (high | medium | low)"
            echo "  - tcgdex_text_hash"
            echo "Generic notes such as 'TCGDex text fetched and compared to current"
            echo "handler coverage' are not acceptable."
            exit 1
          }
