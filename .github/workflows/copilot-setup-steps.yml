name: Copilot Setup Steps

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: pokeprism
          POSTGRES_USER: pokeprism
          POSTGRES_PASSWORD: changeme_postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U pokeprism -d pokeprism"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    env:
      POSTGRES_USER: pokeprism
      POSTGRES_PASSWORD: changeme_postgres
      DATABASE_URL: postgresql+asyncpg://pokeprism:changeme_postgres@localhost:5433/pokeprism
      REDIS_URL: redis://localhost:6380/0
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme_neo4j
      OLLAMA_BASE_URL: http://localhost:11434
      TCGDEX_BASE_URL: https://api.tcgdex.net/v2/en
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Write local environment files
        run: |
          set -euo pipefail
          cat > .env <<'EOF'
          POSTGRES_USER=pokeprism
          POSTGRES_PASSWORD=changeme_postgres
          DATABASE_URL=postgresql+asyncpg://pokeprism:changeme_postgres@localhost:5433/pokeprism
          REDIS_URL=redis://localhost:6380/0
          NEO4J_USER=neo4j
          NEO4J_PASSWORD=changeme_neo4j
          NEO4J_URI=bolt://localhost:7687
          OLLAMA_BASE_URL=http://localhost:11434
          OLLAMA_PLAYER_MODEL=qwen3.5:9b-q4_K_M
          OLLAMA_COACH_MODEL=gemma4-E4B-it-Q6_K:latest
          OLLAMA_EMBED_MODEL=nomic-embed-text
          TCGDEX_BASE_URL=https://api.tcgdex.net/v2/en
          EOF

          cp .env backend/.env

      - name: Install backend dependencies
        run: |
          set -euo pipefail
          cd backend
          python3 --version
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"

      - name: Initialize PostgreSQL extensions
        env:
          PGPASSWORD: changeme_postgres
        run: |
          set -euo pipefail
          psql -h localhost -p 5433 -U pokeprism -d pokeprism -c "CREATE EXTENSION IF NOT EXISTS vector;"
          psql -h localhost -p 5433 -U pokeprism -d pokeprism -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Run database migrations
        run: |
          set -euo pipefail
          cd backend
          python3 -m alembic upgrade head

      - name: Seed card table from repository seed script
        run: |
          set -euo pipefail
          cd backend
          python3 -m scripts.seed_cards

      - name: Verify Copilot audit database access
        run: |
          set -euo pipefail
          cd backend
          python3 - <<'PY'
          import asyncio
          from sqlalchemy import text
          from app.db.session import AsyncSessionLocal

          async def main():
              async with AsyncSessionLocal() as db:
                  total = (await db.execute(text("SELECT count(*) FROM cards"))).scalar_one()
                  first = (await db.execute(text(
                      "SELECT name, set_abbrev, set_number, tcgdex_id "
                      "FROM cards "
                      "ORDER BY name, set_abbrev, set_number, tcgdex_id "
                      "LIMIT 1"
                  ))).first()
                  print(f"DB_BOOTSTRAP_CARD_COUNT={total}")
                  if first:
                      print("DB_BOOTSTRAP_FIRST_CARD=" + " | ".join(str(x) for x in first))
                  if total == 0:
                      raise SystemExit("cards table is empty after seed")

          asyncio.run(main())
          PY
